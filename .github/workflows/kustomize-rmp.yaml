# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
---
name: Kustomize Dynamic Rendered Manifest
on:
  merge_group:
  pull_request:
    types:
      - opened
      - synchronize
    branches:
      - main
    paths:
      - '**/kustomization.yaml'
      - '**/kustomization.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  rendered-manifest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request'
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          client-id: ${{ secrets.GHAPP_APP_ID }}
          private-key: ${{ secrets.GHAPP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: '${{ steps.app-token.outputs.token }}'
          fetch-depth: 0

      - name: Find modified Kustomization.yaml files
        id: changed-files
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47
        with:
          files: |
            **/kustomization.yaml
            **/kustomization.yml

      - name: Generate diffs for each Kustomization
        id: gen-pr-kustomize
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          echo "KUSTOMIZATION_FILES=${ALL_CHANGED_FILES}"
          UNIQ_PATHS_CHANGED=$(echo "$ALL_CHANGED_FILES" | tr ' ' '\n' | grep -v '^$' | awk -F/ '{if (NF > 1) {NF--; print $0}}' OFS='/' | sort -u)
          echo "UNIQ_PATHS_CHANGED=$UNIQ_PATHS_CHANGED"
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin && chmod +x /usr/local/bin/kustomize

          template() {
            local suffix=$1
            mkdir -p $suffix
            base=$(basename "$path")
            kustomize build "$path" > "${suffix}/${base}_manifest_${suffix}.yaml"
          }

          for path in ${UNIQ_PATHS_CHANGED}; do
            echo "Processing path: ${path}"

            template "pr"

            if git checkout origin/main -- "$path" 2>/dev/null
            then
              template "main"
            else
              echo "[ WARN ] Path ${path} not present on origin/main, skipping main render"
            fi
            echo ""
          done

      - name: Generate dyff on release
        id: dyff-helm
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: ixxeL-DevOps/gha-templates/.github/actions/dyff@main
        with:
          source: main/*_manifest_main.yaml
          target: pr/*_manifest_pr.yaml
          exclude-regexp: spec.template.metadata.annotations.checksum

      - name: Generate diff on release
        id: diff-helm
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: ixxeL-DevOps/gha-templates/.github/actions/diff@main
        with:
          source: main/*_manifest_main.yaml
          target: pr/*_manifest_pr.yaml

      - name: Post diff as comment
        if: steps.changed-files.outputs.any_changed == 'true' && github.event_name == 'pull_request'
        run: |
          gh pr comment ${{ github.event.number }} --repo ${{ github.repository }} --body-file diff.md --edit-last || \
          gh pr comment ${{ github.event.number }} --repo ${{ github.repository }} --body-file diff.md
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.TOKEN }}

      - name: Kubeconform
        id: kubeconform
        if: steps.changed-files.outputs.any_changed == 'true'
        continue-on-error: true
        uses: ixxeL-DevOps/gha-templates/.github/actions/kubeconform@main
        with:
          target: pr

      - name: Surface Kubeconform outcome
        if: steps.changed-files.outputs.any_changed == 'true' && always()
        run: |
          OUTCOME="${{ steps.kubeconform.outcome }}"
          if [ "${OUTCOME}" = "success" ]
          then
            echo "### Kubeconform: passed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Kubeconform: ${OUTCOME} (non-blocking)" >> "$GITHUB_STEP_SUMMARY"
            echo "::warning title=Kubeconform::Validation outcome=${OUTCOME} — review the step logs"
          fi
