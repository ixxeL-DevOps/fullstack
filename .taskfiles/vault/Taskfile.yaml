---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

tasks:
  oicd-setup:
    desc: Configure k8s auth for Vault External Secrets
    requires:
      vars:
        - cluster
    cmds:
      - task: enable-vault-oidc
        vars:
          cluster: '{{.cluster}}'

  eso-auth-setup:
    desc: Configure k8s auth for Vault External Secrets
    requires:
      vars:
        - cluster
    cmds:
      - task: enable-vault-k8s
        vars:
          cluster: '{{.cluster}}'
      - task: config-vault-k8s-auth
        vars:
          cluster: '{{.cluster}}'
          namespace: external-secrets
          service_account: eso-auth
      - task: create-vault-k8s-role
        vars:
          cluster: '{{.cluster}}'
          namespace: external-secrets
          service_account: eso-auth
          role: eso
          policy: secretstore

  certmanager-auth-setup:
    desc: Configure k8s auth for Vault Certmanager
    requires:
      vars:
        - cluster
    cmds:
      - task: enable-vault-k8s
        vars:
          cluster: '{{.cluster}}'
      - task: config-vault-k8s-auth
        vars:
          cluster: '{{.cluster}}'
          namespace: cert-manager
          service_account: certmanager-auth
      - task: create-vault-k8s-role
        vars:
          cluster: '{{.cluster}}'
          namespace: cert-manager
          service_account: certmanager-auth
          role: certmanager
          policy: pki_fredcorp

  enable-vault-k8s:
    desc: 'Check if Kubernetes auth is already enabled'
    summary: |
      Args:
        cluster: Cluster to run command against (required)
    cmds:
      - |
        if ! vault auth list -tls-skip-verify -address={{.VAULT_ENDPOINT}} -format=json | jq -e '.["{{.cluster}}-k8s/"] | .type == "kubernetes"' > /dev/null
        then
          echo "Kubernetes auth {{.cluster}}-k8s is does not exist yet, creating it..."
          vault auth enable -path={{.cluster}}-k8s/ -tls-skip-verify -address={{.VAULT_ENDPOINT}} kubernetes
        else
          echo "Kubernetes auth {{.cluster}}-k8s is already enabled. Skipping."
        fi
    requires:
      vars:
        - cluster
    silent: true
    continue: true

  config-vault-k8s-auth:
    desc: 'Configure Kubernetes Auth in Vault'
    cmds:
      - |
        echo "Configuring Kubernetes Auth in Vault..."
        until kubectl get sa {{.service_account}} -n {{.namespace}} > /dev/null 2>&1; do
          echo "ServiceAccount {{.service_account}} not found, waiting 5s..."
          sleep 5
        done
        kubectl config view --raw --minify --flatten -o jsonpath='{.clusters[].cluster.certificate-authority-data}' | base64 --decode > ca.crt
        K8S_HOST="$(kubectl config view --raw --minify -o jsonpath='{.clusters[0].cluster.server}')"
        TOKEN="$(kubectl get secret -n {{.namespace}} {{.service_account}} -o jsonpath='{.data.token}' | base64 -d)"
        vault write -tls-skip-verify -address={{.VAULT_ENDPOINT}}  \
          auth/{{.cluster}}-k8s/config token_reviewer_jwt="$TOKEN" \
          kubernetes_host="$K8S_HOST" \
          kubernetes_ca_cert=@ca.crt
        rm ca.crt
    requires:
      vars:
        - cluster
        - namespace
        - service_account
    silent: true
    continue: true

  create-vault-k8s-role:
    desc: 'Create associated role in Vault'
    cmds:
      - |
        echo "Creating associated role in Vault..."
        vault write -tls-skip-verify -address={{.VAULT_ENDPOINT}}  \
          auth/{{.cluster}}-k8s/role/{{.role}} \
          bound_service_account_names={{.service_account}} \
          bound_service_account_namespaces={{.namespace}} \
          policies={{.policy}} ttl=24h
    requires:
      vars:
        - cluster
        - namespace
        - service_account
        - role
        - policy
    silent: true
    continue: true

  enable-vault-oidc:
    desc: 'Check if OIDC auth is already enabled'
    summary: |
      Args:
        cluster: Cluster to run command against (required)
    cmds:
      - |
        if ! vault auth list -tls-skip-verify -address={{.VAULT_ENDPOINT}} -format=json | jq -e '.["{{.cluster}}-oidc/"] | .type == "oidc"' > /dev/null
        then
          echo "OIDC auth {{.cluster}}-oidc is does not exist yet, creating it..."
          vault auth enable -path={{.cluster}}-oidc/ -tls-skip-verify -address={{.VAULT_ENDPOINT}} oidc
        else
          echo "OIDC auth {{.cluster}}-oidc/ is already enabled. Skipping."
        fi
    requires:
      vars:
        - cluster
    silent: true
    continue: true

  unseal-secret:beelink:
    desc: 'Recreate vault-transit-token K8s secret on genmachine from Vault KV (admin/unseal/genmachine/vault)'
    vars:
      VAULT_ADDR_GENMACHINE: 'https://vault.talos-genmachine.fredcorp.com'
      KUBE_CONTEXT: 'admin@genmachine'
    cmds:
      - task: unseal-secret:apply
        vars:
          vault_addr: '{{.VAULT_ADDR_GENMACHINE}}'
          kv_path: 'admin/unseal/beelink/vault'

  break-deadlock:genmachine:
    desc: 'Break transit seal deadlock on genmachine: strip seal block, restart pod, unseal with Shamir, then re-enable transit and migrate'
    vars:
      VAULT_ADDR_GENMACHINE: 'https://vault.talos-genmachine.fredcorp.com'
      KUBE_CONTEXT: 'admin@genmachine'
      CONFIGMAP: 'vault-config'
    cmds:
      - task: break-deadlock:apply
        vars:
          vault_addr: '{{.VAULT_ADDR_GENMACHINE}}'
          kube_context: '{{.KUBE_CONTEXT}}'
          configmap: '{{.CONFIGMAP}}'
          seal_address: 'https://vault.k0s-fullstack.fredcorp.com'
          seal_key_name: 'unseal-genmachine'
          pod_name: 'vault-0'

  break-deadlock:beelink:
    desc: 'Break transit seal deadlock on beelink: strip seal block, restart pod, unseal with Shamir, then re-enable transit and migrate'
    vars:
      KUBE_CONTEXT: 'k0s-fullstack'
      CONFIGMAP: 'vault-k0s-config'
    cmds:
      - task: break-deadlock:apply
        vars:
          vault_addr: '{{.VAULT_ENDPOINT}}'
          kube_context: '{{.KUBE_CONTEXT}}'
          configmap: '{{.CONFIGMAP}}'
          seal_address: 'https://vault.talos-genmachine.fredcorp.com'
          seal_key_name: 'unseal-beelink'
          pod_name: 'vault-k0s-0'

  break-deadlock:apply:
    internal: true
    requires:
      vars:
        - vault_addr
        - kube_context
        - configmap
        - seal_address
        - seal_key_name
        - pod_name
    cmds:
      - |
        echo "==> Step 1: stripping seal block from ConfigMap {{.configmap}}..."
        BASE_HCL=$(kubectl --context={{.kube_context}} get configmap {{.configmap}} -n vault \
          -o jsonpath='{.data.extraconfig-from-values\.hcl}' \
          | sed '/^seal "transit"/,/^}/d' | sed '/^$/N;/^\n$/d')
        kubectl --context={{.kube_context}} patch configmap {{.configmap}} -n vault \
          --type merge -p "{\"data\":{\"extraconfig-from-values.hcl\":$(echo "$BASE_HCL" | jq -Rs .)}}"
        echo "==> Step 2: deleting pod {{.pod_name}} to pick up new config..."
        kubectl --context={{.kube_context}} delete pod {{.pod_name}} -n vault
        echo "==> Waiting for pod to be Running..."
        kubectl --context={{.kube_context}} wait pod/{{.pod_name}} -n vault \
          --for=condition=Ready=false --timeout=60s 2>/dev/null || true
        until kubectl --context={{.kube_context}} get pod {{.pod_name}} -n vault \
          -o jsonpath='{.status.phase}' 2>/dev/null | grep -q Running; do sleep 2; done
        sleep 3
        echo ""
        echo "==> Step 3: Vault is running with Shamir seal."
        echo "    Run: vault operator unseal -tls-skip-verify -address={{.vault_addr}} <shamir_key>"
        echo "    Then come back and run the migrate step."
        echo ""
        read -p "Press ENTER once Vault is unsealed to restore transit seal and migrate..."
        echo "==> Step 4: restoring seal block in ConfigMap..."
        FULL_HCL="${BASE_HCL}
        seal \"transit\" {
          address         = \"{{.seal_address}}\"
          token           = \"\$TRANSIT_UNSEAL_TOKEN\"
          key_name        = \"{{.seal_key_name}}\"
          mount_path      = \"transit/\"
          tls_skip_verify = \"true\"
        }"
        kubectl --context={{.kube_context}} patch configmap {{.configmap}} -n vault \
          --type merge -p "{\"data\":{\"extraconfig-from-values.hcl\":$(echo "$FULL_HCL" | jq -Rs .)}}"
        echo "==> Step 5: deleting pod to reload config with transit seal..."
        kubectl --context={{.kube_context}} delete pod {{.pod_name}} -n vault
        until kubectl --context={{.kube_context}} get pod {{.pod_name}} -n vault \
          -o jsonpath='{.status.phase}' 2>/dev/null | grep -q Running; do sleep 2; done
        sleep 3
        echo ""
        echo "==> Step 6: migrating from Shamir to Transit seal..."
        vault operator unseal -migrate -tls-skip-verify -address={{.vault_addr}}
        echo ""
        echo "Done. Vault will auto-unseal via transit on next restart."
    silent: true

  unseal-secret:genmachine:
    desc: 'Recreate vault-transit-token K8s secret on beelink from Vault KV (admin/unseal/beelink/vault)'
    vars:
      VAULT_ADDR_BEELINK: 'https://vault.k0s-fullstack.fredcorp.com'
      KUBE_CONTEXT: 'k0s-fullstack'
    cmds:
      - task: unseal-secret:apply
        vars:
          vault_addr: '{{.VAULT_ADDR_BEELINK}}'
          kv_path: 'admin/unseal/genmachine/vault'

  unseal-secret:apply:
    internal: true
    requires:
      vars:
        - vault_addr
        - kv_path
    cmds:
      - |
        echo "Reading transit token from Vault ({{.vault_addr}}) at {{.kv_path}}..."
        TOKEN=$(vault kv get -tls-skip-verify -address={{.vault_addr}} -field=token {{.kv_path}})
        if [ -z "$TOKEN" ]; then
          echo "ERROR: failed to read token from {{.kv_path}}"
          exit 1
        fi
        echo "Creating/updating vault-transit-token secret..."
        kubectl create secret generic vault-transit-token \
          --namespace=vault \
          --from-literal=token="$TOKEN" \
          --dry-run=client -o yaml | kubectl apply -f -
        echo "Done."
    silent: true

  login:token:
    desc: Login to Vault using a token
    silent: true
    cmds:
      - |
        echo "🔐 Logging into Vault with token..."
        vault login -address={{ .VAULT_ENDPOINT }} >/dev/null

        echo "✅ Vault login successful"
        vault token lookup | grep -E "display_name|ttl"

  login:sso:
    desc: Login to Vault using SSO (OIDC)
    silent: true
    cmds:
      - |
        echo "🔑 Logging into Vault via SSO..."

        vault login -address={{ .VAULT_ENDPOINT }} -method=oidc

        echo "✅ Vault SSO login successful"
        vault token lookup | grep -E "display_name|ttl"
