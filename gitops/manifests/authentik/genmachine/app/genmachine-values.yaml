---
authentik:
  blueprints:
    configMaps:
      - authentik-blueprints
  global:
    image:
      repository: ghcr.io/goauthentik/server
      tag: '2026.2.3'
      pullPolicy: IfNotPresent
    env:
      - name: ADGUARD_ADMIN_PWD
        valueFrom:
          secretKeyRef:
            name: adguard-creds
            key: ADGUARD_ADMIN_PWD
      - name: HOMEPAGE_AUTHENTIK_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: homepage-authentik-api-token
            key: HOMEPAGE_AUTHENTIK_API_TOKEN
      - name: AUTHENTIK_IXXEL_PASSWORD
        valueFrom:
          secretKeyRef:
            name: authentik-bootstrap
            key: ixxel-password
      - name: AUTHENTIK_BOOTSTRAP_PASSWORD
        valueFrom:
          secretKeyRef:
            name: authentik-bootstrap
            key: password
      - name: AUTHENTIK_BOOTSTRAP_TOKEN
        valueFrom:
          secretKeyRef:
            name: authentik-bootstrap
            key: token
    volumeMounts:
      - name: secrets
        mountPath: /secrets
      - name: pgsql-creds
        mountPath: /pgsql-creds
    volumes:
      - name: secrets
        secret:
          secretName: authentik-key
      - name: pgsql-creds
        secret:
          secretName: authentik-pgsql-creds

  authentik:
    log_level: debug
    secret_key: file:///secrets/secret-key
    error_reporting:
      enabled: false
    postgresql:
      # host: 'authentik-pgsql-rw'
      # name: 'authentik'
      # port: 5432
      user: file:///pgsql-creds/username
      password: file:///pgsql-creds/password

  server:
    replicas: 2
    deploymentStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
    pdb:
      enabled: true
      minAvailable: 1
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: authentik
                  app.kubernetes.io/component: server
              topologyKey: kubernetes.io/hostname
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: authentik
            app.kubernetes.io/component: server
    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: fredcorp-ca
        cert-manager.io/common-name: authentik.talos-genmachine.fredcorp.com
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/service.scheme: https
      hosts:
        - authentik.talos-genmachine.fredcorp.com
      pathType: Prefix
      tls:
        - secretName: authentik-tls-cert
          hosts:
            - authentik.talos-genmachine.fredcorp.com
      # -- uses `server.service.servicePortHttps` instead of `server.service.servicePortHttp`
      https: false

  worker:
    replicas: 2
    deploymentStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
    pdb:
      enabled: true
      minAvailable: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: authentik
                  app.kubernetes.io/component: worker
              topologyKey: kubernetes.io/hostname
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: authentik
            app.kubernetes.io/component: worker

  postgresql:
    enabled: true
    image:
      repository: library/postgres
      tag: 17.10-bookworm
    auth:
      username: authentik
      database: authentik
      existingSecret: authentik-pgsql-creds
    primary:
      persistence:
        existingClaim: pvc-authentik-pgsql-data
        storageClass: proxmox-retain
        size: 8Gi
