# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
# yamllint disable
---
version: 1

metadata:
  name: Users
entries:
  - model: authentik_core.user
    identifiers:
      username: ixxel
    attrs:
      username: ixxel
      name: main user
      email: fredspiers@gmail.com
      is_active: true
      is_superuser: true
      path: users
      password: !Env AUTHENTIK_IXXEL_PASSWORD
      groups:
        - !Find [authentik_core.group, [name, 'authentik Admins']]
