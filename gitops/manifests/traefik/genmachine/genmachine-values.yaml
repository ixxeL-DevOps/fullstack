---
traefik:
  image:
    registry: docker.io
    repository: traefik
    tag: v3.7.1
    pullPolicy: IfNotPresent

  global:
    checkNewVersion: false
    sendAnonymousUsage: false

  tlsStore:
    default:
      defaultCertificate:
        secretName: genmachine-wildcard

  deployment:
    replicas: 2

  ports:
    web:
      http:
        redirections:
          entryPoint:
            to: websecure
            scheme: https

  service:
    loadBalancerIP: '192.168.1.160'

  metrics:
    addInternals: true
    prometheus:
      entryPoint: metrics
      service:
        enabled: true
      # -- When set to true, it won't check if Prometheus Operator CRDs are deployed
      disableAPICheck: true
      serviceMonitor:
        enabled: true
        additionalLabels:
          release: prometheus
