---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-creds
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: admin
  target:
    name: grafana-admin-creds
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: grafana/credentials/genmachine
        property: user
    - secretKey: admin-password
      remoteRef:
        key: grafana/credentials/genmachine
        property: password
