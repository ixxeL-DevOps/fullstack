---
kube-prometheus-stack:
  prometheusOperator:
    image:
      registry: quay.io
      repository: prometheus-operator/prometheus-operator
      tag: v0.91.0
      pullPolicy: IfNotPresent

  prometheus:
    enabled: true
    prometheusSpec:
      image:
        registry: quay.io
        repository: prometheus/prometheus
        tag: v3.11.3
      retention: 7d
      scrapeInterval: '30s'
      logLevel: info
      serviceMonitorSelector:
        matchLabels:
          release: 'prometheus'
      podMonitorSelector:
        matchLabels:
          release: 'prometheus'

    ingress:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: fredcorp-ca
        cert-manager.io/common-name: prometheus.talos-genmachine.fredcorp.com
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/service.scheme: https
      ingressClassName: traefik
      pathType: Prefix
      hosts:
        - prometheus.talos-genmachine.fredcorp.com
      path: /
      tls:
        - hosts:
            - prometheus.talos-genmachine.fredcorp.com
          secretName: prometheus-tls-cert
  grafana:
    admin:
      existingSecret: grafana-admin-creds
      userKey: admin-user
      passwordKey: admin-password
    image:
      registry: docker.io
      repository: grafana/grafana
      tag: '12.4.3'
      pullPolicy: IfNotPresent
    podAnnotations:
      reloader.stakater.com/auto: 'true'
    envFromSecrets:
      - name: grafana-oidc
    extraContainerVolumes:
      - name: fredcorp-ca-chain
        secret:
          defaultMode: 420
          secretName: fredcorp-ca-chain
    extraVolumeMounts:
      - name: fredcorp-ca-chain
        mountPath: /etc/ssl/certs/fredcorp-ca-chain.pem
        subPath: fredcorp-ca-chain.pem
        readOnly: true
    grafana.ini:
      auth:
        oauth_auto_login: true
        signout_redirect_url: https://authentik.talos-genmachine.fredcorp.com/application/o/genmachine-grafana/end-session/
      auth.generic_oauth:
        enabled: true
        name: authentik
        allow_sign_up: true
        client_id: ${GF_AUTH_GENERIC_OAUTH_CLIENT_ID}
        client_secret: ${GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
        scopes: 'openid profile email entitlements'
        auth_url: https://authentik.talos-genmachine.fredcorp.com/application/o/authorize/
        token_url: https://authentik.talos-genmachine.fredcorp.com/application/o/token/
        api_url: https://authentik.talos-genmachine.fredcorp.com/application/o/userinfo/
        role_attribute_path: contains(groups[*], 'Grafana admins') && 'Admin' || 'Viewer'
        tls_client_ca: /etc/ssl/certs/fredcorp-ca-chain.pem
      server:
        root_url: https://grafana.talos-genmachine.fredcorp.com
    ingress:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: fredcorp-ca
        cert-manager.io/common-name: grafana.talos-genmachine.fredcorp.com
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/service.scheme: https
      ingressClassName: traefik
      hosts:
        - grafana.talos-genmachine.fredcorp.com
      path: /
      tls:
        - hosts:
            - grafana.talos-genmachine.fredcorp.com
          secretName: grafana-tls-cert

prometheus-blackbox-exporter:
  ingress:
    enabled: true
    className: 'traefik'
    annotations:
      cert-manager.io/cluster-issuer: fredcorp-ca
      cert-manager.io/common-name: blackbox.talos-genmachine.fredcorp.com
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/service.scheme: https
    hosts:
      - host: blackbox.talos-genmachine.fredcorp.com
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls:
      - hosts:
          - blackbox.talos-genmachine.fredcorp.com
        secretName: blackbox-tls-cert

prometheus-pushgateway:
  image:
    repository: quay.io/prometheus/pushgateway
    tag: v1.11.2
    pullPolicy: IfNotPresent
  ingress:
    enabled: true
    className: 'traefik'
    annotations:
      cert-manager.io/cluster-issuer: fredcorp-ca
      cert-manager.io/common-name: push-gateway.talos-genmachine.fredcorp.com
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/service.scheme: https
    hosts:
      - push-gateway.talos-genmachine.fredcorp.com
    tls:
      - hosts:
          - push-gateway.talos-genmachine.fredcorp.com
        secretName: push-gateway-tls-cert
  serviceMonitor:
    enabled: true
    namespace: prometheus
    additionalLabels:
      release: prometheus
