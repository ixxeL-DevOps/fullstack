---
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: renovate-ixxel-devops
  namespace: renovate-operator
spec:
  image: ghcr.io/renovatebot/renovate:43.144.0
  schedule: "0 */6 * * *"
  parallelism: 1
  provider:
    name: github
  discoveryFilters:
    - "ixxeL-DevOps/fullstack"
  skipForks: true
  secretRef: renovate-secret
  extraEnv:
    - name: LOG_LEVEL
      value: debug
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoExecute
