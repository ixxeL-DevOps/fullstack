---
# kopia-creds: repository encryption password + S3 credentials + server UI password
# Vault paths to provision:
#   kopia/repo/minio-backup → password  (repository encryption key)
#   kopia/server            → password  (Kopia server UI admin password)
#   minio/creds/admin       → user, password (shared with restic)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kopia-creds
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: admin
    kind: ClusterSecretStore
  target:
    name: kopia-creds
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        KOPIA_PASSWORD: '{{ "{{" }}.kopia_password{{ "}}" }}'
        AWS_ACCESS_KEY_ID: '{{ "{{" }}.minio_user{{ "}}" }}'
        AWS_SECRET_ACCESS_KEY: '{{ "{{" }}.minio_password{{ "}}" }}'
        KOPIA_SERVER_PASSWORD: '{{ "{{" }}.server_password{{ "}}" }}'
  data:
    - secretKey: kopia_password
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: kopia/repo/minio-backup
        property: password
    - secretKey: minio_user
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: minio/creds/admin
        property: user
    - secretKey: minio_password
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: minio/creds/admin
        property: password
    - secretKey: server_password
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: kopia/server
        property: password
