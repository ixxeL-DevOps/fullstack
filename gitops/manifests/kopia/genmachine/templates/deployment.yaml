---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kopia
  labels:
    app: kopia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kopia
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: kopia
    spec:
      initContainers:
        # Connect to existing S3 repository or create it if first run
        - name: kopia-init
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: kopia-creds
          env:
            - name: KOPIA_CONFIG_PATH
              value: /app/config/repository.config
            - name: KOPIA_CACHE_DIRECTORY
              value: /app/cache
            - name: SSL_CERT_FILE
              value: /certs/fredcorp-ca-chain.pem
          command: ["/bin/sh", "-c"]
          args:
            - |
              kopia repository connect s3 \
                --bucket={{ .Values.config.bucket }} \
                --endpoint={{ .Values.config.endpoint }} \
                --no-check-for-updates \
                --password="${KOPIA_PASSWORD}" \
                2>/dev/null \
              || \
              kopia repository create s3 \
                --bucket={{ .Values.config.bucket }} \
                --endpoint={{ .Values.config.endpoint }} \
                --no-check-for-updates \
                --password="${KOPIA_PASSWORD}"
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: cache
              mountPath: /app/cache
            - name: ca-cert
              mountPath: /certs
              readOnly: true
      containers:
        - name: kopia
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: kopia-creds
          env:
            - name: KOPIA_CONFIG_PATH
              value: /app/config/repository.config
            - name: KOPIA_CACHE_DIRECTORY
              value: /app/cache
            - name: SSL_CERT_FILE
              value: /certs/fredcorp-ca-chain.pem
          command: ["/bin/sh", "-c"]
          args:
            - |
              kopia server start \
                --address=0.0.0.0:51515 \
                --server-username={{ .Values.config.serverUsername }} \
                --server-password="${KOPIA_SERVER_PASSWORD}" \
                --no-legacy-api \
                --no-check-for-updates \
                --log-level=info
          ports:
            - name: http
              containerPort: 51515
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/v1/repo/status
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/repo/status
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: cache
              mountPath: /app/cache
            - name: ca-cert
              mountPath: /certs
              readOnly: true
      volumes:
        - name: config
          emptyDir: {}
        - name: cache
          persistentVolumeClaim:
            claimName: pvc-kopia
        - name: ca-cert
          secret:
            secretName: fredcorp-ca-chain
            items:
              - key: fredcorp-ca-chain.pem
                path: fredcorp-ca-chain.pem
