---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: fstrim
  namespace: kube-system
spec:
  schedule: {{ .Values.fstrim.schedule | quote }}
  successfulJobsHistoryLimit: {{ .Values.fstrim.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.fstrim.failedJobsHistoryLimit }}
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      completions: {{ .Values.fstrim.nodeCount }}
      parallelism: {{ .Values.fstrim.nodeCount }}
      completionMode: Indexed
      backoffLimit: 0
      template:
        spec:
          restartPolicy: Never
          hostPID: true
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: DoNotSchedule
              labelSelector:
                matchLabels:
                  job-name: fstrim
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoExecute
          containers:
            - name: fstrim
              image: {{ .Values.fstrim.image.repository }}:{{ .Values.fstrim.image.tag }}
              imagePullPolicy: {{ .Values.fstrim.image.pullPolicy }}
              command:
                - nsenter
                - --target
                - "1"
                - --mount
                - --
                - fstrim
                - -av
              securityContext:
                privileged: true
              resources:
                requests:
                  cpu: 10m
                  memory: 16Mi
                limits:
                  memory: 64Mi
