---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: rs-kopia-homarr-db
spec:
  sourcePVC: homarr-database
  trigger:
    schedule: "0 3 * * *"
  kopia:
    repository: kopia-config
    pruneIntervalDays: 7
    retain:
      daily: 7
      weekly: 3
      monthly: 2
    copyMethod: Direct
    storageClassName: nfs-csi-delete
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kopia-config
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: admin
    kind: ClusterSecretStore
  target:
    name: kopia-config
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        KOPIA_PASSWORD: '{{ "{{" }}.kopia_password{{ "}}" }}'
        AWS_ACCESS_KEY_ID: '{{ "{{" }}.minio_user{{ "}}" }}'
        AWS_SECRET_ACCESS_KEY: '{{ "{{" }}.minio_password{{ "}}" }}'
        KOPIA_S3_BUCKET: "kopia"
        KOPIA_S3_ENDPOINT: "minio-api.talos-genmachine.fredcorp.com"
        KOPIA_OBJECT_PREFIX: "homarr/genmachine-pvc/"
  data:
    - secretKey: kopia_password
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: kopia/repo/minio-backup
        property: password
    - secretKey: minio_user
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: minio/creds/admin
        property: user
    - secretKey: minio_password
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: minio/creds/admin
        property: password
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: rs-homarr-db
spec:
  sourcePVC: homarr-database
  trigger:
    schedule: "0 3 * * *"
  restic:
    customCA:
      secretName: fredcorp-ca-chain
      key: fredcorp-ca-chain.pem
    pruneIntervalDays: 7
    repository: restic-config
    retain:
      daily: 7
      weekly: 3
      monthly: 2
    copyMethod: Direct
    storageClassName: nfs-csi-delete
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: restic-config
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: admin
    kind: ClusterSecretStore
  target:
    name: restic-config
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        RESTIC_REPOSITORY: s3:https://minio-api.talos-genmachine.fredcorp.com/restic/homarr/genmachine-pvc
        RESTIC_PASSWORD: '{{ "{{" }}.restic_password{{ "}}" }}'
        AWS_ACCESS_KEY_ID: '{{ "{{" }}.minio_user{{ "}}" }}'
        AWS_SECRET_ACCESS_KEY: '{{ "{{" }}.minio_password{{ "}}" }}'
  data:
    - secretKey: restic_password
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: restic/repo/minio-backup
        property: password
    - secretKey: minio_user
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: minio/creds/admin
        property: user
    - secretKey: minio_password
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: minio/creds/admin
        property: password
