---
vault:
  server:
    image:
      repository: 'hashicorp/vault'
      tag: '2.0.0'
      pullPolicy: IfNotPresent

    dataStorage:
      enabled: true
      size: 10Gi
      storageClass: proxmox-retain
      accessMode: ReadWriteOnce

    extraSecretEnvironmentVars:
      - envName: TRANSIT_UNSEAL_TOKEN
        secretName: vault-transit-token
        secretKey: token

    standalone:
      enabled: true
      config: |-
        ui = true

        listener "tcp" {
          tls_disable = 1
          address = "[::]:8200"
          cluster_address = "[::]:8201"
        }
        storage "file" {
          path = "/vault/data"
        }
        seal "transit" {
          address         = "https://vault.k0s-fullstack.fredcorp.com"
          token           = "$TRANSIT_UNSEAL_TOKEN"
          key_name        = "unseal-genmachine"
          mount_path      = "transit/"
          tls_skip_verify = "true"
        }

    ingress:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: fredcorp-ca
        cert-manager.io/common-name: vault.talos-genmachine.fredcorp.com
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/service.scheme: https
      ingressClassName: traefik
      pathType: Prefix
      activeService: true
      hosts:
        - host: vault.talos-genmachine.fredcorp.com
          paths: []
      tls:
        - secretName: vault-tls-cert
          hosts:
            - vault.talos-genmachine.fredcorp.com
