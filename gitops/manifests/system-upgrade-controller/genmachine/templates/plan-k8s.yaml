---
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: k8s
spec:
  version: {{ .Values.plan.kubeversion }}
  concurrency: 1
  exclusive: true
  jobActiveDeadlineSecs: 3600
  serviceAccountName: system-upgrade
  nodeSelector:
    matchExpressions:
      - key: kubernetes.io/hostname
        operator: Exists
  tolerations:
    - key: CriticalAddonsOnly
      operator: Exists
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  secrets:
    - name: system-upgrade-talos
      path: /var/run/secrets/talos.dev
      ignoreUpdates: true
  # Wait for all nodes to be Ready before running upgrade-k8s — prevents starting
  # the k8s upgrade while a node is still rebooting after a Talos OS upgrade.
  prepare:
    image: registry.k8s.io/kubectl:{{ .Values.plan.kubeversion }}
    args:
      - wait
      - node
      - --all
      - --for=condition=Ready
      - --timeout=600s
  drain:
    ignoreDaemonSets: true
    force: true
    timeout: 600
  upgrade:
    image: ghcr.io/siderolabs/talosctl:{{ .Values.plan.talosVersion }}
    envs:
      - name: NODE_IP
        valueFrom:
          fieldRef:
            fieldPath: status.hostIP
    args:
      - --nodes=$(NODE_IP)
      - upgrade-k8s
      - --to=$(SYSTEM_UPGRADE_PLAN_LATEST_VERSION)
